<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Giriş</title>
  <style>
    body {
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
      color:white;
    }
    .login-box {
      background:#1e293b;
      padding:30px;
      border-radius:12px;
      width:300px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }
    input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
      outline:none;
    }
    button {
      width:100%;
      padding:10px;
      margin-top:15px;
      background:#4f46e5;
      border:none;
      color:white;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
    }
    button:hover {
      background:#4338ca;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Admin Panel Girişi</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="Kullanıcı adı" required>
      <input type="password" name="password" placeholder="Şifre" required>
      <button type="submit">Giriş Yap</button>
    </form>
  </div>
</body>
</html>
